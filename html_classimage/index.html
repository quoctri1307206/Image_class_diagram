<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IMAGE CLASS DIAGRAM</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100vw;
      min-height: 100vh;
      background: #000;
      font-family: Arial, sans-serif;
      overflow: auto;
    }

    .toolbar {
      position: fixed;
      top: 15px;
      right: 15px;
      z-index: 10;
      display: flex;
      gap: 10px;
    }

    .toolbar button {
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      background: white;
      color: black;
      font-size: 16px;
      cursor: pointer;
      font-weight: bold;
    }

    .toolbar button:hover {
      background: #e8e8e8;
    }

    .image-wrapper {
      min-width: 100vw;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #000;
      overflow: auto;
      padding: 20px;
    }

    .image-wrapper img {
      max-width: none;
      max-height: none;
      width: 100vw;
      height: auto;
      display: block;
      transition: transform 0.2s ease;
      transform-origin: center center;
      cursor: zoom-in;
    }
  </style>
</head>

<body>
  <div class="toolbar">
    <button onclick="zoomOut()">-</button>
    <button onclick="resetZoom()">Reset</button>
    <button onclick="zoomIn()">+</button>
  </div>

  <div class="image-wrapper">
    <!-- Đổi tên file ảnh ở dòng src bên dưới cho đúng với ảnh của em -->
    <img id="myImage" src="CLASS _ JUKEBOX.png" alt="Coursework image" />
  </div>

  <script>
    const image = document.getElementById("myImage");
    let zoomLevel = 1;

    function updateZoom() {
      image.style.transform = `scale(${zoomLevel})`;
    }

    function zoomIn() {
      zoomLevel += 0.2;
      updateZoom();
    }

    function zoomOut() {
      if (zoomLevel > 0.4) {
        zoomLevel -= 0.2;
        updateZoom();
      }
    }

    function resetZoom() {
      zoomLevel = 1;
      updateZoom();
    }

    image.addEventListener("click", function () {
      zoomLevel += 0.2;
      updateZoom();
    });
  </script>
</body>
</html>
